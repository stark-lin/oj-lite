name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: oj-lite
  ARCH_GO_VERSION: v2.1.2

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "The following files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Install arch-go
        run: go install github.com/arch-go/arch-go/v2@${ARCH_GO_VERSION}

      - name: Check architecture dependencies
        run: arch-go --color no

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win-amd64
            goos: windows
            goarch: amd64
            ext: .exe
            package: zip
          - target: linux-arm
            goos: linux
            goarch: arm64
            ext: ""
            package: tar
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            package: tar
          - target: mac-arm
            goos: darwin
            goarch: arm64
            ext: ""
            package: tar
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}${{ matrix.ext }}" ./cmd/server
          cp COPYING README.md dist/

      - name: Package binary
        run: |
          if [ "${{ matrix.package }}" = "zip" ]; then
            (cd dist && zip "../${APP_NAME}-${TARGET}.zip" "${APP_NAME}${{ matrix.ext }}" COPYING README.md)
          else
            (cd dist && tar -czf "../${APP_NAME}-${TARGET}.tar.gz" "${APP_NAME}${{ matrix.ext }}" COPYING README.md)
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.target }}.zip
            ${{ env.APP_NAME }}-${{ matrix.target }}.tar.gz
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: main-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --target "${{ github.sha }}" \
            --title "main build ${{ github.run_number }}.${{ github.run_attempt }}" \
            --generate-notes